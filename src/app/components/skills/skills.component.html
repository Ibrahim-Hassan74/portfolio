<section id="skills" class="relative border-t border-border-subtle py-24">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="skills-header max-w-2xl opacity-0 translate-y-8">
      <h2 class="text-3xl font-bold tracking-tight text-text-primary sm:text-4xl">
        Technical <span class="text-accent">Skills</span>
      </h2>
      <p class="mt-3 text-sm text-text-secondary sm:text-base">
        Every skill backed by shipped code
      </p>
    </div>

    <div class="mt-12 space-y-8">
      @for (cat of categories; track cat.category; let i = $index) {
        <div class="skill-category opacity-0 translate-y-8">
          <h3 class="text-sm font-semibold uppercase tracking-wider text-text-muted">
            {{ cat.category }}
          </h3>
          <div class="mt-3 flex flex-wrap gap-2">
            @for (skill of cat.skills; track skill.name) {
              <span
                class="skill-badge inline-block rounded-full border bg-elevated px-3 py-1.5 text-sm cursor-pointer"
                [class.border-accent]="skill.featured"
                [class.text-text-primary]="skill.featured"
                [class.border-border-subtle]="!skill.featured"
                [class.text-text-secondary]="!skill.featured"
              >
                {{ skill.name }}
              </span>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
